name: contract

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: contract-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-shape:
    # Non-binary checks — schema validity, SKILL.md frontmatter shape,
    # script linting. These run without needing the catchai binary
    # installed, so they're the fast feedback loop on PRs.
    name: Schema + frontmatter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: python -m pip install --quiet jsonschema pyyaml

      - name: schema.json is valid JSON Schema
        run: |
          python - <<'PY'
          import json
          import jsonschema
          with open("schema.json") as f:
              schema = json.load(f)
          jsonschema.Draft202012Validator.check_schema(schema)
          print("schema.json: ok")
          PY

      - name: SKILL.md frontmatter parses
        run: |
          python - <<'PY'
          import yaml
          text = open("SKILL.md").read()
          assert text.startswith("---\n"), "missing frontmatter"
          end = text.find("\n---\n", 4)
          assert end != -1, "frontmatter not closed"
          meta = yaml.safe_load(text[4:end])
          for key in ("name", "description", "metadata"):
              assert key in meta, f"missing top-level field: {key}"
          oc = meta["metadata"]["openclaw"]
          for key in ("min_catchai_version", "output_version", "requires"):
              assert key in oc, f"missing openclaw.{key}"
          assert oc["output_version"] == "openclaw-v1", oc["output_version"]
          print("SKILL.md frontmatter: ok")
          PY

      - name: shellcheck adapters
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts

  contract-test:
    # Full end-to-end contract test against an installed catchai binary.
    # Skipped on PRs from forks because the install step requires either
    # public read access to wheels or a CI license key — both should
    # only run on trusted code paths. PRs from the repo's own branches
    # and pushes to main do run it.
    #
    # Load-bearing as of catchai v0.0.1: a CI failure here means either
    # the install path is broken or the openclaw-v1 contract drifted.
    # Both are real correctness signals; both should block the PR.
    #
    # We fetch install.sh from raw.githubusercontent.com directly
    # because ``install.catchai.io`` DNS is not configured yet. Swap to
    # the brand URL once that lands; behavior is identical.
    name: End-to-end contract test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validators
        run: python -m pip install --quiet jsonschema pyyaml

      - name: Install catchai
        env:
          CATCHAI_LICENSE_KEY: ${{ secrets.CATCHAI_CI_LICENSE_KEY }}
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/MihailMihaylov97/catchai-dist/main/install.sh \
            | bash
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run contract test
        run: tests/contract_test.sh
